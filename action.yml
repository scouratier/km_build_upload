name: 'Bump Version and Tag'
description: 'Reads a version file, bumps the patch version, commits, tags, and pushes. Outputs the new version and derived Docker image name.'

outputs:
  new_version:
    description: 'The newly bumped semantic version (e.g., 1.2.4)'
    value: ${{ steps.bump.outputs.new_version }}
  image_name:
    description: 'The Docker image name derived from the repository name (e.g., km_brain_fe)'
    value: ${{ steps.bump.outputs.image_name }}

runs:
  using: 'composite'
  steps:
    - name: Bump version and tag
      id: bump
      shell: bash
      run: go run ${{ github.action_path }}/main.go
